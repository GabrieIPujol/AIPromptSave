<div class="page-container">
  <div class="form-header">
    <a routerLink="/prompts" class="back-link">← Voltar</a>
    <h2 class="page-title">{{ editando ? 'Editar Prompt' : 'Novo Prompt' }}</h2>
  </div>

  <div *ngIf="erro" class="toast-error">{{ erro }}</div>

  <form class="form-card">
    <mat-form-field appearance="outline" class="campo">
      <mat-label>Título</mat-label>
      <input matInput [(ngModel)]="prompt.titulo" name="titulo" placeholder="Ex: Remover fundo de imagem">
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo">
      <mat-label>IA</mat-label>
      <mat-select [(ngModel)]="prompt.ia" name="ia">
        <mat-option value="">Selecione a IA</mat-option>
        <mat-option *ngFor="let ia of ias" [value]="ia.nome">{{ ia.nome }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo">
      <mat-label>Prompt</mat-label>
      <textarea matInput [(ngModel)]="prompt.texto" name="texto" placeholder="Escreva o prompt aqui..." rows="6"></textarea>
    </mat-form-field>

    <div class="form-actions">
      <button mat-raised-button color="primary" type="button" (click)="salvar()">
        {{ editando ? 'Atualizar' : 'Salvar' }}
      </button>
      <a mat-button routerLink="/prompts">Cancelar</a>
    </div>
  </form>
</div>

<div class="page-container">
  <div class="page-header">
    <h2 class="page-title">Meus Prompts</h2>
    <a mat-raised-button color="primary" routerLink="/prompts/novo">
      <mat-icon>add</mat-icon> Novo Prompt
    </a>
  </div>

  <div *ngIf="mensagem" class="toast toast-success">{{ mensagem }}</div>
  <div *ngIf="erro" class="toast toast-error">{{ erro }}</div>

  <div class="prompt-grid" *ngIf="prompts.length > 0; else nenhumPrompt">
    <mat-card class="prompt-card" *ngFor="let prompt of prompts">
      <mat-card-header>
        <mat-card-title>{{ prompt.titulo }}</mat-card-title>
        <mat-card-subtitle>
          <mat-chip-set>
            <mat-chip>{{ prompt.ia }}</mat-chip>
          </mat-chip-set>
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p class="card-texto">{{ prompt.texto }}</p>
      </mat-card-content>

      <mat-card-actions align="end">
        <a mat-button color="primary" [routerLink]="['/prompts/editar', prompt.id]">
          <mat-icon>edit</mat-icon> Editar
        </a>
        <button mat-button color="warn" (click)="deletarPrompt(prompt.id)">
          <mat-icon>delete</mat-icon> Excluir
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <ng-template #nenhumPrompt>
    <div class="empty-state">
      <mat-icon class="empty-icon">auto_awesome</mat-icon>
      <p class="empty-title">Nenhum prompt cadastrado ainda.</p>
      <a mat-raised-button color="primary" routerLink="/prompts/novo">Criar primeiro prompt</a>
    </div>
  </ng-template>
</div>

<mat-toolbar color="primary">
  <a class="toolbar-brand" routerLink="/">
    <mat-icon>psychology</mat-icon>
    AI Prompt Save
  </a>
  <span class="spacer"></span>
  <a mat-button routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: true}">Home</a>
  <a mat-button routerLink="/sobre" routerLinkActive="nav-active">Sobre</a>
  <a mat-button routerLink="/ias" routerLinkActive="nav-active">IAs</a>
  <button mat-icon-button (click)="toggleTheme()" [title]="darkMode ? 'Modo claro' : 'Modo escuro'">
    <mat-icon>{{ darkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <a mat-raised-button routerLink="/prompts" routerLinkActive="nav-active">Meus Prompts</a>
</mat-toolbar>

<router-outlet></router-outlet>

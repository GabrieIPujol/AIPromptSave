<div class="page-container">
  <h1 class="page-title">{{ titulo }}</h1>
  <p class="page-subtitle">{{ descricao }}</p>

  <div class="section">
    <h2 class="section-title">Tecnologias Utilizadas</h2>
    <ul class="tech-list">
      <li *ngFor="let tec of tecnologias" class="tech-item">{{ tec }}</li>
    </ul>
  </div>

  <div class="section">
    <h2 class="section-title">Autores</h2>
    <ul class="tech-list">
      <li *ngFor="let autor of autores" class="tech-item">{{ autor }}</li>
    </ul>
  </div>
</div>
